name = "our-dictionary-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding     = "DB"
database_name = "our-dictionary-db"
database_id   = "1540b42e-e2df-4eca-9714-aa05cb8f18e3"

[[r2_buckets]]
binding     = "VOICES"
bucket_name = "our-dictionary-voices"

[vars]
# Frontend origin for CORS — update after deploying to Pages
ALLOWED_ORIGIN = "https://love-language.pages.dev/"
